<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>KrumblED</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #161b27;
      --border: #1e2535;
      --accent: #4ade80;
      --yellow: #facc15;
      --red: #ef4444;
      --text: #f0f2f5;
      --muted: #6b7280;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .logo .g { color: var(--accent); }
    .logo .y { color: var(--yellow); }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    /* LANGUAGE */
    .lang-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lang-label { font-size: 12px; color: var(--text); }
    .lang-btns { display: flex; gap: 4px; }
    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #1a3352;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    /* HOW IT WORKS */
    .steps { display: flex; flex-direction: column; gap: 8px; }
    .step { display: flex; gap: 9px; align-items: flex-start; }
    .step-num {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #1e2535;
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-text { font-size: 11px; color: #9ca3af; line-height: 1.5; }

    /* FOOTER */
    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .version { font-size: 10px; color: var(--muted); font-family: monospace; }
    .footer-link {
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
    }
    .footer-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">🍪 <span class="g">KrumblED</span> <span class="y"></span></div>
    <div class="tagline">Cookie transparency & control</div>
  </div>
</div>

<!-- LANGUAGE -->
<div class="section">
  <div class="section-title">Language / Langue</div>
  <div class="lang-row">
    <span class="lang-label">Choose display language</span>
    <div class="lang-btns">
      <button class="lang-btn" data-lang="en" id="btnEn">🇨🇦 EN</button>
      <button class="lang-btn" data-lang="fr" id="btnFr">🇫🇷 FR</button>
    </div>
  </div>
</div>

<!-- HOW IT WORKS -->
<div class="section">
  <div class="section-title">How it works</div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Detects cookie-consent banners automatically when you visit a site.</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Use the Voice button to hear the summary read aloud. Select cookies to block, then click <em>Block selected</em>.</div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
